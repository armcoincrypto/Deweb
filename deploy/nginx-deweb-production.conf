# DEWEB production: Next.js homepage + legacy static app + API
# SSL paths assume certbot for dewebam.com (adjust if needed)

server {
    listen 80;
    listen [::]:80;
    server_name dewebam.com www.dewebam.com 95.111.233.120;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dewebam.com www.dewebam.com 95.111.233.120;

    ssl_certificate /etc/letsencrypt/live/dewebam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dewebam.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/deweb/deweb-community;
    index index.html;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js build assets — ^~ beats regex *.css / *.js below
    location ^~ /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy static pages (account, admin, cart, etc.)
    location ~ ^/(account|account-dashboard|admin|cart|payment|services|privacy-policy)\.html$ {
        try_files $uri =404;
    }

    # DEWEB D logo favicons — always serve from Next.js (single source of truth)
    location ~ ^/(favicon\.ico|icon\.png|apple-icon\.png|brand-logo\.png|site\.webmanifest|favicon-[0-9]+x[0-9]+\.png|apple-touch-icon\.png|android-chrome-[0-9]+x[0-9]+\.png)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Legacy static files in deweb-community; if missing, proxy to Next.js
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|webmanifest)$ {
        try_files $uri @next_upstream;
        expires 7d;
        add_header Cache-Control "public";
    }

    location @next_upstream {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Old homepage — redirect to new Next.js home
    location = /index.html {
        return 302 /;
    }

    # New premium homepage (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
