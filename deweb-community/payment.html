<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00D4FF" />
  <meta name="application-name" content="DEWEB" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>DEWEB — Pay with DEWEB</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile.css" />
  <link rel="stylesheet" href="cookies.css" />
</head>
<body class="details-body">
  <script src="cookies.js"></script>

  <nav class="navbar navbar-details">
    <div class="logo">D</div>
    <ul class="nav-links">
      <li><a href="index.html" id="backToDeweb">← Back to DEWEB</a></li>
      <li><a href="cart.html" id="backToCart">Cart</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-dd" id="langDD">
        <button class="lang-dd__btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="lang-dd__label" id="langLabel">EN</span>
          <span class="lang-dd__arrow" aria-hidden="true">‹</span>
        </button>
        <div class="lang-dd__menu" id="langMenu" role="listbox" aria-label="Language"></div>
      </div>
    </div>
  </nav>

  <main class="details-page">
    <section class="cart-section payment-page-section">
      <h2 class="cart-page-title" id="paymentTitle">Pay with DEWEB</h2>
      <div class="payment-summary" id="paymentSummary"></div>

      <div class="wallet-balance-card section-block" id="balanceBox" style="margin-bottom:1.5rem">
        <span class="wallet-balance-card__label">Your DEWEB balance</span>
        <strong id="dewebBalance">—</strong>
        <p id="balanceHint">Pay sellers and services using internal DEWEB coins.</p>
      </div>

      <div class="payment-section" id="paymentSection">
        <button type="button" class="cta-btn primary" id="payWithDewebBtn">Pay with DEWEB</button>
        <p class="payment-method-hint" id="insufficientHint" style="display:none;margin-top:1rem">
          Not enough DEWEB? Top up with crypto on our partner swap site.
        </p>
        <button type="button" class="cta-btn secondary" id="topUpSwapBtn" style="margin-top:0.75rem">Buy crypto / Get DEWEB coins</button>
      </div>
    </section>
  </main>

  <script src="api.js"></script>
  <script src="mobile-nav.js" defer></script>
  <script src="payment.js"></script>
  <link rel="stylesheet" href="support-widget.css" />
  <script src="support-widget.js"></script>
</body>
</html>
