<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00D4FF" />
  <meta name="application-name" content="DEWEB" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>DEWEB — Service Details</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="mobile.css" />
  <link rel="stylesheet" href="cookies.css" />
</head>
<body class="details-body">
  <script src="cookies.js"></script>

  <nav class="navbar navbar-details">
    <div class="logo">D</div>
    <ul class="nav-links">
      <li><a href="#" id="backToDeweb">← Back to DEWEB</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-dd" id="langDD">
        <button class="lang-dd__btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="lang-dd__label" id="langLabel">EN</span>
          <span class="lang-dd__arrow" aria-hidden="true">‹</span>
        </button>
        <div class="lang-dd__menu" id="langMenu" role="listbox" aria-label="Language"></div>
      </div>
    </div>
  </nav>

  <main class="details-page">
    <header class="details-head">
      <span class="badge" id="catBadge">Service</span>
      <h1 id="catTitle">Web & E-commerce</h1>
      <p class="sub" id="catSubtitle">Choose what you need — each item has scope, base price, and the option to offer your price.</p>
    </header>

    <section class="details-list" id="detailsGrid"></section>

    <section class="offer-buy-section" id="offerBuySection">
      <div class="cart-offer-buy-row">
        <div class="cart-offer-col">
          <h4 id="offerTitle">Offer your price</h4>
          <p class="sub" id="offerSub">Tell us your scope and budget — we'll reply with the best plan and timeline.</p>
          <div class="offer-selected-name" id="offerSelectedName"></div>
          <form class="order-form" id="offerForm">
            <label for="offerText" id="offerLabel">What do you need?</label>
            <textarea id="offerText" rows="4" placeholder="Describe your project..."></textarea>
            <div class="order-2col">
              <input id="offerName" type="text" placeholder="Name" />
              <input id="offerEmail" type="email" placeholder="Email" required />
            </div>
            <div class="order-2col">
              <input id="offerBudget" type="text" placeholder="Your budget (optional)" />
              <input id="offerDeadline" type="text" placeholder="Deadline (optional)" />
            </div>
            <button class="cta-btn primary" type="submit">Send inquiry</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="api.js"></script>
  <script src="mobile-nav.js" defer></script>
  <script src="services.js"></script>
  <link rel="stylesheet" href="support-widget.css" />
  <script src="support-widget.js"></script>
</body>
</html>
