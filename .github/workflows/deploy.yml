name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'gagpoghosyan99/deweb-community'
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEWEB_HOST }}
          username: ${{ secrets.DEWEB_USER }}
          key: ${{ secrets.DEWEB_SSH_KEY }}
          script: bash /var/www/deweb/deploy/update.sh
